# The IdP. Runs its own migrations at startup (ensure_database +
# MIGRATOR), so no init job is needed; it simply restarts until Postgres
# is ready. TRUST_PROXY=1 because Traefik fronts it — without this, IP
# throttling would see Traefik's address for every client.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regnid
  namespace: regnmed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: regnid
  template:
    metadata:
      labels:
        app: regnid
    spec:
      containers:
        - name: regnid
          image: regnid:dev
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          env:
            - name: DATABASE_URL
              value: postgres://regnmed:regnmed@postgres:5432/regnid
            - name: ISSUER
              value: http://id.regnmed.localhost
            - name: BIND_ADDR
              value: 0.0.0.0:8081
            - name: TRUST_PROXY
              value: "1"
            - name: MAIL_BACKEND
              value: nats
            - name: NATS_URL
              value: nats://nats:4222
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: 16Mi
            limits:
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: regnid
  namespace: regnmed
spec:
  selector:
    app: regnid
  ports:
    - port: 8081
