# The accounting API. Migrations run as an init container (same image
# carries the regnmed CLI). OIDC points at regnid through the SAME public
# issuer URL the browser uses — the CoreDNS rewrite makes that resolve to
# Traefik inside the cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regnmed-api
  namespace: regnmed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: regnmed-api
  template:
    metadata:
      labels:
        app: regnmed-api
    spec:
      initContainers:
        - name: migrate
          image: regnmed:dev
          imagePullPolicy: IfNotPresent
          command: ["/app/regnmed", "migrate"]
          env:
            - name: DATABASE_URL
              value: postgres://regnmed:regnmed@postgres:5432/regnmed
      containers:
        - name: api
          image: regnmed:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgres://regnmed:regnmed@postgres:5432/regnmed
            - name: OIDC_ISSUER
              value: http://id.regnmed.localhost
            - name: OIDC_AUDIENCE
              value: regnmed
            - name: NATS_URL
              value: nats://nats:4222
            - name: BIND_ADDR
              value: 0.0.0.0:8080
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 16Mi
            limits:
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: regnmed-api
  namespace: regnmed
spec:
  selector:
    app: regnmed-api
  ports:
    - port: 8080
---
# Anchoring is a system workflow, not a user action: nightly, every
# company's chain head is frozen under one Merkle root, published on the
# public /anchors endpoint (and witnessed by an RFC 3161 TSA when
# ANCHOR_TSA_URL is set — deliberately unset in the local cluster).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: regnmed-anchor
  namespace: regnmed
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: anchor
              image: regnmed:dev
              imagePullPolicy: IfNotPresent
              command: ["/app/regnmed", "anchor"]
              env:
                - name: DATABASE_URL
                  value: postgres://regnmed:regnmed@postgres:5432/regnmed
              resources:
                requests:
                  memory: 8Mi
                limits:
                  memory: 32Mi
