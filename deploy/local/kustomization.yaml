# Local "production-like" cluster (k3d/k3s in colima). Apply with
# `kubectl apply -k deploy/local` — or just run scripts/dev-cluster.sh up.
# Sized for an 8 GB Mac: single replicas, small memory limits, no TLS
# (HTTP through Traefik; the prod overlay is where TLS lives). The
# CoreDNS rewrite makes *.localhost resolve to Traefik inside pods, so
# the browser and the cluster share one issuer URL.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - coredns-custom.yaml
  - ingress.yaml
