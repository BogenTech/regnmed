# Frugal CI, one job: format check + the full test suite against a real
# Postgres 18 service, so the DB-backed integration tests (ledger
# immutability, auth boundary, SAF-T loader) run for real instead of
# skipping. libxml2-utils provides xmllint so every run also validates the
# SAF-T export against Skatteetaten's official XSD.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: regnmed
          POSTGRES_PASSWORD: regnmed
          POSTGRES_DB: regnmed
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U regnmed"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://regnmed:regnmed@localhost:5432/regnmed
    steps:
      - uses: actions/checkout@v4
      - name: Install xmllint (SAF-T XSD validation)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo test --workspace
